openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Trade Request Receiver API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: webhook
  - name: signals
  - name: settings
  - name: executions
  - name: storage
  - name: guides
  - name: portfolio
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhook/tradingview:
    post:
      operationId: receiveTradingViewWebhook
      tags: [webhook]
      summary: Receive webhook from TradingView
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Signal received and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "400":
          description: Bad request

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List all received trade signals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: action
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSignal"

  /signals/{id}:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get a single trade signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signal found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "404":
          description: Not found

  /signals/stats:
    get:
      operationId: getSignalStats
      tags: [signals]
      summary: Aggregated statistics about received signals
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalStats"

  /signals/{id}/execution:
    get:
      operationId: getSignalExecution
      tags: [executions]
      summary: Get execution record for a signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "404":
          description: Not found

  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List recent executions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Save settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /settings/test-connection:
    post:
      operationId: testPublicConnection
      tags: [settings]
      summary: Test Public.com API connection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                publicApiToken:
                  type: string
                publicAccountId:
                  type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /guide-assets:
    get:
      operationId: listGuideAssets
      tags: [guides]
      summary: List all uploaded guide assets
      parameters:
        - name: assetType
          in: query
          schema:
            type: string
            enum: [file, image]
      responses:
        "200":
          description: List of guide assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuideAsset"
    post:
      operationId: createGuideAsset
      tags: [guides]
      summary: Register an uploaded asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuideAssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuideAsset"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get live portfolio from Public.com
      responses:
        "200":
          description: Portfolio data or disconnected state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /guide-assets/{id}:
    delete:
      operationId: deleteGuideAsset
      tags: [guides]
      summary: Delete a guide asset record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    WebhookPayload:
      type: object
      properties:
        ticker:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        interval:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        time:
          type: ["string", "null"]
        timenow:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        basecurrency:
          type: ["string", "null"]
        quantity:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        position_size:
          type: ["number", "null"]
        order_price:
          type: ["number", "null"]
        order_id:
          type: ["string", "null"]
        order_comment:
          type: ["string", "null"]

    TradeSignal:
      type: object
      required: [id, ticker, action, receivedAt, raw]
      properties:
        id:
          type: integer
        ticker:
          type: string
        action:
          type: string
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        quantity:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        interval:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        basecurrency:
          type: ["string", "null"]
        alertTime:
          type: ["string", "null"]
        timenow:
          type: ["string", "null"]
        positionSize:
          type: ["number", "null"]
        orderPrice:
          type: ["number", "null"]
        orderId:
          type: ["string", "null"]
        orderComment:
          type: ["string", "null"]
        receivedAt:
          type: string
          format: date-time
        raw:
          type: object
        execution:
          $ref: "#/components/schemas/Execution"
          description: Attached execution if available

    SignalStats:
      type: object
      required: [total, buys, sells, lastSignalAt, tickerBreakdown]
      properties:
        total:
          type: integer
        buys:
          type: integer
        sells:
          type: integer
        lastSignalAt:
          type: ["string", "null"]
          format: date-time
        tickerBreakdown:
          type: array
          items:
            type: object
            required: [ticker, count]
            properties:
              ticker:
                type: string
              count:
                type: integer

    Execution:
      type: object
      required: [id, signalId, status, createdAt]
      properties:
        id:
          type: integer
        signalId:
          type: integer
        status:
          type: string
          description: "pending | submitted | filled | failed | skipped"
        publicOrderId:
          type: ["string", "null"]
        orderType:
          type: ["string", "null"]
        side:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        limitPrice:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Settings:
      type: object
      required: [orderType, instrumentType, defaultQuantity, timeInForce, autoExecute]
      properties:
        publicAccountId:
          type: ["string", "null"]
          description: Public.com account ID
        hasApiToken:
          type: boolean
          description: Whether an API token is configured (token itself never returned)
        orderType:
          type: string
          enum: [MARKET, LIMIT]
        instrumentType:
          type: string
          enum: [EQUITY, CRYPTO]
        defaultQuantity:
          type: string
        timeInForce:
          type: string
          enum: [DAY, GTC]
        autoExecute:
          type: boolean

    SettingsInput:
      type: object
      properties:
        publicApiToken:
          type: ["string", "null"]
          description: Public.com API token — pass null to keep existing
        publicAccountId:
          type: ["string", "null"]
        orderType:
          type: string
          enum: [MARKET, LIMIT]
        instrumentType:
          type: string
          enum: [EQUITY, CRYPTO]
        defaultQuantity:
          type: string
        timeInForce:
          type: string
          enum: [DAY, GTC]
        autoExecute:
          type: boolean

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    GuideAsset:
      type: object
      required: [id, name, label, objectPath, contentType, assetType, uploadedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        objectPath:
          type: string
        contentType:
          type: string
        size:
          type: ["integer", "null"]
        assetType:
          type: string
          description: "file | image"
        uploadedAt:
          type: string
          format: date-time

    GuideAssetInput:
      type: object
      required: [name, label, objectPath, contentType, assetType]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        objectPath:
          type: string
        contentType:
          type: string
        size:
          type: ["integer", "null"]
        assetType:
          type: string

    Position:
      type: object
      required: [symbol, type, quantity]
      properties:
        symbol:
          type: string
        type:
          type: string
        quantity:
          type: string
        currentValue:
          type: ["string", "null"]
        averageCost:
          type: ["string", "null"]
        unrealizedPnl:
          type: ["string", "null"]
        unrealizedPnlPercent:
          type: ["string", "null"]

    Portfolio:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        error:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
        accountType:
          type: ["string", "null"]
        buyingPower:
          type: ["string", "null"]
        cashOnlyBuyingPower:
          type: ["string", "null"]
        totalValue:
          type: ["string", "null"]
        positions:
          type: array
          items:
            $ref: "#/components/schemas/Position"

    ConnectionTestResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        accountId:
          type: ["string", "null"]
        accountType:
          type: ["string", "null"]
        buyingPower:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
