openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Trade Request Receiver API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: webhook
    description: Webhook ingestion
  - name: signals
    description: Trade signal management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhook/tradingview:
    post:
      operationId: receiveTradingViewWebhook
      tags: [webhook]
      summary: Receive webhook from TradingView
      description: >
        Endpoint to paste into TradingView's alert webhook URL field.
        Accepts the alert payload (JSON or plain text) and stores it as a trade signal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Signal received and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "400":
          description: Bad request

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List all received trade signals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: action
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSignal"

  /signals/{id}:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get a single trade signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signal found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "404":
          description: Not found

  /signals/stats:
    get:
      operationId: getSignalStats
      tags: [signals]
      summary: Aggregated statistics about received signals
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    WebhookPayload:
      type: object
      description: TradingView alert payload — all fields are optional and come from the alert message template
      properties:
        ticker:
          type: ["string", "null"]
          description: "{{ticker}} — trading symbol e.g. BTCUSDT"
        exchange:
          type: ["string", "null"]
          description: "{{exchange}} — exchange name e.g. BINANCE"
        interval:
          type: ["string", "null"]
          description: "{{interval}} — chart timeframe e.g. 1h, 4h, 1D"
        action:
          type: ["string", "null"]
          description: "{{strategy.order.action}} — buy or sell"
        price:
          type: ["number", "null"]
          description: "{{close}} — close price at alert time"
        open:
          type: ["number", "null"]
          description: "{{open}} — open price of the bar"
        high:
          type: ["number", "null"]
          description: "{{high}} — high price of the bar"
        low:
          type: ["number", "null"]
          description: "{{low}} — low price of the bar"
        volume:
          type: ["number", "null"]
          description: "{{volume}} — bar volume"
        time:
          type: ["string", "null"]
          description: "{{time}} — UTC time when alert triggered (yyyy-MM-ddTHH:mm:ssZ)"
        timenow:
          type: ["string", "null"]
          description: "{{timenow}} — current fire time of the alert"
        currency:
          type: ["string", "null"]
          description: "{{syminfo.currency}} — quote currency e.g. USD"
        basecurrency:
          type: ["string", "null"]
          description: "{{syminfo.basecurrency}} — base currency e.g. BTC"
        quantity:
          type: ["number", "null"]
          description: "{{strategy.order.contracts}} — number of contracts"
        strategy:
          type: ["string", "null"]
          description: Name of the strategy (custom field)"
        message:
          type: ["string", "null"]
          description: Custom message text from the alert"
        position_size:
          type: ["number", "null"]
          description: "{{strategy.position_size}} — current position size"
        order_price:
          type: ["number", "null"]
          description: "{{strategy.order.price}} — fill price of the order"
        order_id:
          type: ["string", "null"]
          description: "{{strategy.order.id}} — order ID string"
        order_comment:
          type: ["string", "null"]
          description: "{{strategy.order.comment}} — order comment"

    TradeSignal:
      type: object
      required: [id, ticker, action, receivedAt, raw]
      properties:
        id:
          type: integer
        ticker:
          type: string
        action:
          type: string
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        quantity:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        interval:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        basecurrency:
          type: ["string", "null"]
        alertTime:
          type: ["string", "null"]
          description: The {{time}} value from TradingView
        timenow:
          type: ["string", "null"]
        positionSize:
          type: ["number", "null"]
        orderPrice:
          type: ["number", "null"]
        orderId:
          type: ["string", "null"]
        orderComment:
          type: ["string", "null"]
        receivedAt:
          type: string
          format: date-time
        raw:
          type: object
          description: Full raw payload as received

    SignalStats:
      type: object
      required: [total, buys, sells, lastSignalAt, tickerBreakdown]
      properties:
        total:
          type: integer
        buys:
          type: integer
        sells:
          type: integer
        lastSignalAt:
          type: ["string", "null"]
          format: date-time
        tickerBreakdown:
          type: array
          items:
            type: object
            required: [ticker, count]
            properties:
              ticker:
                type: string
              count:
                type: integer
