openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Trade Request Receiver API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: webhook
  - name: signals
  - name: settings
  - name: executions
  - name: storage
  - name: guides
  - name: portfolio
  - name: trades
  - name: strategies
paths:
  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List all saved strategies with stats
      responses:
        "200":
          description: List of strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyWithStats"
    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a new strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a strategy with full P&L stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyWithStats"
        "404":
          description: Not found
    put:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
    delete:
      operationId: deleteStrategy
      tags: [strategies]
      summary: Delete a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /webhook/tradingview:
    post:
      operationId: receiveTradingViewWebhook
      tags: [webhook]
      summary: Receive webhook from TradingView
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Signal received and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "400":
          description: Bad request

  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List all received trade signals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: action
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSignal"

  /signals/{id}:
    get:
      operationId: getSignal
      tags: [signals]
      summary: Get a single trade signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signal found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeSignal"
        "404":
          description: Not found

  /signals/stats:
    get:
      operationId: getSignalStats
      tags: [signals]
      summary: Aggregated statistics about received signals
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalStats"

  /signals/{id}/execution:
    get:
      operationId: getSignalExecution
      tags: [executions]
      summary: Get execution record for a signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "404":
          description: Not found

  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List recent executions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Save settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /settings/test-connection:
    post:
      operationId: testPublicConnection
      tags: [settings]
      summary: Test Public.com API connection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                publicApiToken:
                  type: string
                publicAccountId:
                  type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /guide-assets:
    get:
      operationId: listGuideAssets
      tags: [guides]
      summary: List all uploaded guide assets
      parameters:
        - name: assetType
          in: query
          schema:
            type: string
            enum: [file, image]
      responses:
        "200":
          description: List of guide assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuideAsset"
    post:
      operationId: createGuideAsset
      tags: [guides]
      summary: Register an uploaded asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuideAssetInput"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuideAsset"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List all tracked trades
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/stats:
    get:
      operationId: getTradeStats
      tags: [trades]
      summary: Aggregated P&L and win-rate stats
      responses:
        "200":
          description: Trade statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeStats"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get live portfolio from Public.com
      responses:
        "200":
          description: Portfolio data or disconnected state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /guide-assets/{id}:
    delete:
      operationId: deleteGuideAsset
      tags: [guides]
      summary: Delete a guide asset record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    WebhookPayload:
      type: object
      properties:
        ticker:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        interval:
          type: ["string", "null"]
        action:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        time:
          type: ["string", "null"]
        timenow:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        basecurrency:
          type: ["string", "null"]
        quantity:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        position_size:
          type: ["number", "null"]
        order_price:
          type: ["number", "null"]
        order_id:
          type: ["string", "null"]
        order_comment:
          type: ["string", "null"]

    TradeSignal:
      type: object
      required: [id, ticker, action, receivedAt, raw]
      properties:
        id:
          type: integer
        ticker:
          type: string
        action:
          type: string
        price:
          type: ["number", "null"]
        open:
          type: ["number", "null"]
        high:
          type: ["number", "null"]
        low:
          type: ["number", "null"]
        volume:
          type: ["number", "null"]
        quantity:
          type: ["number", "null"]
        strategy:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        exchange:
          type: ["string", "null"]
        interval:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        basecurrency:
          type: ["string", "null"]
        alertTime:
          type: ["string", "null"]
        timenow:
          type: ["string", "null"]
        positionSize:
          type: ["number", "null"]
        orderPrice:
          type: ["number", "null"]
        orderId:
          type: ["string", "null"]
        orderComment:
          type: ["string", "null"]
        receivedAt:
          type: string
          format: date-time
        raw:
          type: object
        execution:
          $ref: "#/components/schemas/Execution"
          description: Attached execution if available

    SignalStats:
      type: object
      required: [total, buys, sells, lastSignalAt, tickerBreakdown]
      properties:
        total:
          type: integer
        buys:
          type: integer
        sells:
          type: integer
        lastSignalAt:
          type: ["string", "null"]
          format: date-time
        tickerBreakdown:
          type: array
          items:
            type: object
            required: [ticker, count]
            properties:
              ticker:
                type: string
              count:
                type: integer

    Execution:
      type: object
      required: [id, signalId, status, createdAt]
      properties:
        id:
          type: integer
        signalId:
          type: integer
        status:
          type: string
          description: "pending | submitted | filled | failed | skipped"
        publicOrderId:
          type: ["string", "null"]
        orderType:
          type: ["string", "null"]
        side:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        limitPrice:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Settings:
      type: object
      required: [orderType, instrumentType, defaultQuantity, timeInForce, autoExecute]
      properties:
        publicAccountId:
          type: ["string", "null"]
          description: Public.com account ID
        hasApiToken:
          type: boolean
          description: Whether a Public.com API token is configured (token itself never returned)
        hasRobinhoodToken:
          type: boolean
          description: Whether a Robinhood bearer token is configured
        hasWebullKey:
          type: boolean
          description: Whether Webull App Key is configured
        webullAccountId:
          type: ["string", "null"]
          description: Webull account ID (optional)
        orderType:
          type: string
          enum: [MARKET, LIMIT]
        instrumentType:
          type: string
          enum: [EQUITY, CRYPTO]
        defaultQuantity:
          type: string
        timeInForce:
          type: string
          enum: [DAY, GTC]
        autoExecute:
          type: boolean
        buyFraction:
          type: string
          description: Fraction of defaultQuantity to use for buy orders (0.01–1.00)
        neverSellAtLoss:
          type: boolean
          description: If true, sell orders are skipped when current price is below the tracked buy price
        startingCapital:
          type: string
          description: Paper-trading starting capital for Indicator P&L simulation (default 10000)

    SettingsInput:
      type: object
      properties:
        publicApiToken:
          type: ["string", "null"]
          description: Public.com API token — pass null to keep existing
        publicAccountId:
          type: ["string", "null"]
        robinhoodBearerToken:
          type: ["string", "null"]
          description: Robinhood OAuth bearer token — pass null to keep existing
        webullAppKey:
          type: ["string", "null"]
          description: Webull App Key — pass null to keep existing
        webullAppSecret:
          type: ["string", "null"]
          description: Webull App Secret — pass null to keep existing
        webullAccountId:
          type: ["string", "null"]
        orderType:
          type: string
          enum: [MARKET, LIMIT]
        instrumentType:
          type: string
          enum: [EQUITY, CRYPTO]
        defaultQuantity:
          type: string
        timeInForce:
          type: string
          enum: [DAY, GTC]
        autoExecute:
          type: boolean
        buyFraction:
          type: string
        neverSellAtLoss:
          type: boolean
        startingCapital:
          type: string
          description: Paper-trading starting capital for Indicator P&L simulation

    Trade:
      type: object
      required: [id, ticker, quantity, status, openedAt]
      properties:
        id:
          type: integer
        ticker:
          type: string
        buySignalId:
          type: ["integer", "null"]
        sellSignalId:
          type: ["integer", "null"]
        buyPrice:
          type: ["string", "null"]
        sellPrice:
          type: ["string", "null"]
        quantity:
          type: string
        status:
          type: string
          description: "open | closed"
        profitLoss:
          type: ["string", "null"]
        profitLossPct:
          type: ["string", "null"]
        actualBuyPrice:
          type: ["string", "null"]
          description: Actual fill price from brokerage for the buy order
        actualSellPrice:
          type: ["string", "null"]
          description: Actual fill price from brokerage for the sell order
        actualProfitLoss:
          type: ["string", "null"]
          description: P&L based on actual brokerage fill prices
        actualProfitLossPct:
          type: ["string", "null"]
          description: P&L % based on actual brokerage fill prices
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: ["string", "null"]
          format: date-time

    TradeStats:
      type: object
      required: [totalTrades, openTrades, closedTrades, wins, losses, totalProfitLoss, winRate, actualWins, actualLosses, actualTotalProfitLoss, actualWinRate, actualTradesTracked]
      properties:
        totalTrades:
          type: integer
        openTrades:
          type: integer
        closedTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        totalProfitLoss:
          type: string
          description: Signal-based P&L (indicator prices)
        winRate:
          type: number
          description: Signal-based win rate
        signalPairs:
          type: integer
          description: Number of completed buy-sell pairs found in signals
        actualWins:
          type: integer
        actualLosses:
          type: integer
        actualTotalProfitLoss:
          type: string
          description: Brokerage P&L (actual fill prices)
        actualWinRate:
          type: number
          description: Brokerage win rate
        actualTradesTracked:
          type: integer
          description: Number of closed trades with actual brokerage fill data

    RequestUploadUrlBody:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    RequestUploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    GuideAsset:
      type: object
      required: [id, name, label, objectPath, contentType, assetType, uploadedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        objectPath:
          type: string
        contentType:
          type: string
        size:
          type: ["integer", "null"]
        assetType:
          type: string
          description: "file | image"
        uploadedAt:
          type: string
          format: date-time

    GuideAssetInput:
      type: object
      required: [name, label, objectPath, contentType, assetType]
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        objectPath:
          type: string
        contentType:
          type: string
        size:
          type: ["integer", "null"]
        assetType:
          type: string

    Position:
      type: object
      required: [symbol, type, quantity]
      properties:
        symbol:
          type: string
        type:
          type: string
        quantity:
          type: string
        currentValue:
          type: ["string", "null"]
        averageCost:
          type: ["string", "null"]
        unrealizedPnl:
          type: ["string", "null"]
        unrealizedPnlPercent:
          type: ["string", "null"]

    Portfolio:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        error:
          type: ["string", "null"]
        accountId:
          type: ["string", "null"]
        accountType:
          type: ["string", "null"]
        buyingPower:
          type: ["string", "null"]
        cashOnlyBuyingPower:
          type: ["string", "null"]
        totalValue:
          type: ["string", "null"]
        positions:
          type: array
          items:
            $ref: "#/components/schemas/Position"

    ConnectionTestResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        accountId:
          type: ["string", "null"]
        accountType:
          type: ["string", "null"]
        buyingPower:
          type: ["string", "null"]
        error:
          type: ["string", "null"]

    StrategyStats:
      type: object
      required: [pairs, wins, losses, totalPnL, winRate, signalCount]
      properties:
        pairs:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        totalPnL:
          type: string
        winRate:
          type: integer
        signalCount:
          type: integer

    Strategy:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        ticker:
          type: ["string", "null"]
        signalTag:
          type: ["string", "null"]
        pineScript:
          type: ["string", "null"]
        alertMessageTemplate:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StrategyWithStats:
      allOf:
        - $ref: "#/components/schemas/Strategy"
        - type: object
          properties:
            stats:
              $ref: "#/components/schemas/StrategyStats"

    StrategyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        ticker:
          type: ["string", "null"]
        signalTag:
          type: ["string", "null"]
        pineScript:
          type: ["string", "null"]
        alertMessageTemplate:
          type: ["string", "null"]
